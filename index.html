<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="google-site-verification"
      content="qjKfj8KfzmDMiJjSBZeYAARm0fei5tzd-aurk-nC0mQ"
    />

    <title data-i18n="site_title">Starblast Rumble Timer</title>
    <meta
      name="description"
      content="The Starblast Rumble Timer."
    />

    <meta property="og:title" content="Starblast Rumble Timer - 스타블래스트 럼블 타이머" />
    <meta
      property="og:description"
      content="The ultimate Starblast.io Rumble countdown timer."
    />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body oncontextmenu="return false;">
    <!-- ⚡ 카피라이트 텍스트 i18n 추가 -->
    <div class="copyright">made by {(KR)}</div>

    <canvas id="space"></canvas>

    <!-- ⚡ 타이머 펴기 버튼 i18n 추가 -->
    <button
      id="openBtn"
      class="open-btn"
      style="font-size: 15px"
      onclick="toggleContainer()"
      data-i18n="btn_open_timer"
    >
      타이머 펴기
    </button>

    <!-- i18n 대응을 위해 data-i18n 추가 -->
    <button
      id="commentOpenBtn"
      class="comment-open-btn"
      onclick="toggleCommentWindow(true)"
      data-i18n="btn_show_comments"
      style="font-size: 15px"
    >
      댓글 표시
    </button>

    <div class="container" id="mainContainer">
      <!-- ⚡ 컨테이너 접기 버튼 i18n 추가 -->
      <button
        class="close-btn"
        onclick="toggleContainer()"
        data-i18n="btn_fold_timer"
      >
        접기
      </button>
      <h1 data-i18n="status_calculating">계산 중...</h1>
      <div class="info" data-i18n="status_calculating">계산 중...</div>
      <div id="countdown" class="timer" data-i18n="status_calculating">
        계산 중...
      </div>
    </div>

    <!-- ⚡ 하단 배포 로그 i18n 추가 -->
    <div class="footer-log">
      Deployments: 113 | Last Optimized: 2026-07-02
      <span id="last-update"></span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script type="module" src="js/comment.js"></script>

    <div
      id="comment-section-wrapper"
      style="
        position: fixed;
        top: 11.5%;
        right: 3%; /* translateX 대신 적절한 여백으로 고정 */
        z-index: 20;
        width: 450px; /* 당신이 원하신 넓은 가로폭 */
        padding: 15px;
        background: rgba(30, 30, 45, 0.95);
        border-radius: 15px;
        box-shadow: 0 0 30px rgba(0, 255, 200, 0.3);
        border: 1px solid rgba(0, 255, 200, 0.2);
        color: white;
        box-sizing: border-box;
      "
    >
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 10px;
          position: relative;
        "
      >
        <span
          style="font-weight: bold; color: #00ffc8"
          data-i18n="comment_title"
          >댓글</span
        >
        <button
          type="button"
          onclick="toggleCommentWindow(false)"
          style="
            background: transparent;
            border: 1px solid #00ffc8;
            color: #00ffc8;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            padding: 1px 5px;
          "
          data-i18n="btn_fold"
        >
          접기
        </button>
      </div>

      <div id="comment-content-inside">
        <div style="margin-bottom: 8px">
          <!-- i18n 대응을 위해 data-i18n-attr 사용 (js 구현 필요) -->
          <input
            type="text"
            id="username"
            placeholder="닉네임"
            data-i18n-placeholder="placeholder_nickname"
            style="width: 100%; box-sizing: border-box; padding: 5px"
          />
        </div>

        <div
          style="
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
            width: 100%;
            box-sizing: border-box;
          "
        >
          <input
            type="password"
            id="password"
            placeholder="비밀번호"
            data-i18n-placeholder="placeholder_password"
            lang="en"
            inputmode="url"
            oninput="this.value = this.value.replace(/[^a-zA-Z0-9]/g, '')"
            style="flex: 1; min-width: 0; padding: 5px; box-sizing: border-box"
          />
          <!-- ⚡ 비밀번호 보기 버튼 i18n 추가 -->
          <button
            type="button"
            id="toggle-password"
            style="padding: 5px; height: 100%; box-sizing: border-box"
            data-i18n="btn_show_password"
          >
            보기
          </button>
        </div>

        <div style="margin-bottom: 8px">
          <input
            type="text"
            id="comment-input"
            placeholder="댓글 내용..."
            data-i18n-placeholder="placeholder_comment"
            style="width: 100%; box-sizing: border-box; padding: 5px"
          />
        </div>
        <button
          id="comment-submit"
          style="width: 100%; margin-bottom: 10px; padding: 6px"
          data-i18n="btn_register"
        >
          등록
        </button>

        <!-- 완벽한 줄바꿈 속성이 반영된 구역 -->
        <div
          id="comment-list"
          style="
            max-height: 180px;
            overflow-y: auto;
            border-top: 1px solid #444;
            padding-top: 5px;
            width: 100%;
            box-sizing: border-box;
            word-wrap: break-word;
            word-break: break-all;
          "
        ></div>
      </div>
    </div>

    <script src="js/lang.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/game.js"></script>
    <script src="js/hint.js"></script>

    <script>
      window.toggleCommentWindow = function (show) {
        const wrapper = document.getElementById("comment-section-wrapper");
        const openBtn = document.getElementById("commentOpenBtn");

        if (show) {
          wrapper.style.display = "block";
          openBtn.style.display = "none";
        } else {
          wrapper.style.display = "none";
          openBtn.style.display = "block";
        }
      };
    </script>
  </body>
</html>
